---

- name: Basic provisioning
  hosts: raspberrypi
  tasks:
    - name: ping
      ping:
      tags: dry-run

    - name: apt update
      become: true
      apt:
        update_cache: true

    - name: apt upgrade
      become: true
      apt:
        upgrade: true

    - name: mount external drive
      become: true
      mount:
        src: /dev/sda1
        path: /srv/dev-disk-by-label-data
        state: mounted
        boot: true
        fstype: ext4
